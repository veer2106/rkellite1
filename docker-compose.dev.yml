version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: restaurant_db_dev
    environment:
      POSTGRES_DB: restaurant_db_dev
      POSTGRES_USER: cafe_user
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5433:5432"  # Different local port
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cafe_user -d restaurant_db_dev"]
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: restaurant_cache_dev
    command: redis-server --appendonly yes --requirepass dev_redis_password
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
    networks:
      - app-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: restaurant_api_dev
    environment:
      NODE_ENV: development
      PORT: 5005
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: restaurant_db_dev
      DB_USER: cafe_user
      DB_PASSWORD: dev_password_123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: dev_redis_password
      API_URL: http://localhost:5005
      FRONTEND_URL: http://localhost:3002
      JWT_SECRET: dev_jwt_secret_change_me
      LOG_LEVEL: debug
    ports:
      - "5005:5005"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/node_modules
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/api/health"]
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app/backend
    command: npm run dev  # Assume dev script

  frontend:
    image: node:20-alpine
    container_name: restaurant_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3002:3002"
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:5005/api
      VITE_WS_URL: ws://localhost:5005
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: restaurant_nginx_dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro  # Need to create
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - frontend
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  app-network:
    driver: bridge

