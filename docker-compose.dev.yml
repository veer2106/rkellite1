# Dev environment - runs alongside prod on SAME EC2 instance
# Uses host nginx (no nginx container) - configure nginx to route dev subdomain to ports 5005, 3002
# Usage: docker compose -p rkellite-dev -f docker-compose.dev.yml --env-file .env.dev up -d

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: restaurant_db_dev
    environment:
      POSTGRES_DB: ${DB_NAME:-restaurant_db_dev}
      POSTGRES_USER: ${DB_USER:-cafe_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password_123}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5433:5432"  # Different port from prod (5432)
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cafe_user} -d ${DB_NAME:-restaurant_db_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: restaurant_cache_dev
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-dev_redis_password}
    ports:
      - "6380:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
    networks:
      - app-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: development
    container_name: restaurant_api_dev
    environment:
      NODE_ENV: development
      PORT: 5005
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-restaurant_db_dev}
      DB_USER: ${DB_USER:-cafe_user}
      DB_PASSWORD: ${DB_PASSWORD:-dev_password_123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-dev_redis_password}
      API_URL: ${API_URL:-https://dev.YOUR_DOMAIN.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://dev.YOUR_DOMAIN.com}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      LOG_LEVEL: debug
    ports:
      - "5005:5005"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/node_modules
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/api/health"]
    command: sh -c "npm install && npm run dev"

  frontend:
    image: node:20-alpine
    container_name: restaurant_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3002:3002"
    command: sh -c "npm install && PORT=3002 npm run start"
    environment:
      REACT_APP_API_URL: /api
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - api
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres_dev_data:
  redis_dev_data:

networks:
  app-network:
    driver: bridge

